<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <!-- Apple touch icon · 180×180 with safe inner bleed. iOS rounds
       the corners and overlays a slight gloss; we just need the mark
       centred inside a generous safe area. -->
  <rect width="180" height="180" fill="#F1EFE9"/>
  <g transform="translate(40 40)">
    <rect x="0" y="22" width="100" height="60" fill="none" stroke="#0A0A0A" stroke-width="6"/>
    <rect x="0" y="28" width="100" height="6" fill="#C99428"/>
    <line x1="0" y1="34" x2="100" y2="34" stroke="#0A0A0A" stroke-width="3"/>
    <path d="M 24 44 L 50 44 L 50 36 L 76 53 L 50 70 L 50 62 L 24 62 Z"
          fill="#C99428" stroke="#0A0A0A" stroke-width="4" stroke-linejoin="round"/>
  </g>
</svg>
